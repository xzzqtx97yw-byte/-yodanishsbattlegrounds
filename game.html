<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1v1 Battlegrounds - Clean UI</title>
<style>
  :root {
    --bg: #08090d;
    --panel: rgba(12, 14, 20, .86);
    --panel-strong: rgba(19, 23, 32, .96);
    --border: rgba(255, 255, 255, .12);
    --border-strong: rgba(255, 255, 255, .22);
    --text: #f5f7fb;
    --muted: #a9b1c2;
    --soft: #d8deea;
    --gold: #f7c948;
    --p1: #f05252;
    --p2: #35d07f;
    --blue: #38bdf8;
    --shadow: 0 24px 80px rgba(0, 0, 0, .48);
    --tight-shadow: 0 14px 44px rgba(0, 0, 0, .34);
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    width: 100%;
    height: 100%;
  }

  body {
    margin: 0;
    overflow: hidden;
    background:
      linear-gradient(150deg, rgba(240, 82, 82, .09), transparent 30%),
      linear-gradient(25deg, transparent 60%, rgba(53, 208, 127, .08)),
      var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  button {
    font: inherit;
  }

  .stage {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      linear-gradient(180deg, rgba(19, 23, 32, .94), rgba(7, 8, 12, .98)),
      repeating-linear-gradient(90deg, rgba(255, 255, 255, .030) 0 1px, transparent 1px 64px),
      repeating-linear-gradient(0deg, rgba(255, 255, 255, .022) 0 1px, transparent 1px 64px);
  }

  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(120deg, transparent 0 42%, rgba(247, 201, 72, .06) 42% 44%, transparent 44%),
      linear-gradient(300deg, transparent 0 54%, rgba(56, 189, 248, .05) 54% 56%, transparent 56%);
    pointer-events: none;
  }

  canvas {
    position: relative;
    display: block;
    width: 100vw;
    height: 100vh;
  }

  .ui {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .screen {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    padding: 28px;
    background:
      linear-gradient(180deg, rgba(8, 9, 13, .70), rgba(8, 9, 13, .54)),
      rgba(8, 9, 13, .32);
    opacity: 0;
    visibility: hidden;
    transform: scale(.98);
    transition:
      opacity 240ms ease,
      transform 240ms ease,
      visibility 0s linear 240ms;
    pointer-events: none;
  }

  .screen.active {
    opacity: 1;
    visibility: visible;
    transform: scale(1);
    transition-delay: 0s;
    pointer-events: auto;
    backdrop-filter: blur(10px);
  }

  .menu-shell,
  .end-shell {
    position: relative;
    width: min(600px, calc(100vw - 40px));
    padding: 32px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, .055), rgba(255, 255, 255, .020)),
      rgba(12, 14, 20, .96);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
  }

  .menu-shell::before,
  .end-shell::before {
    content: "";
    position: absolute;
    inset: 0 0 auto;
    height: 3px;
    background: linear-gradient(90deg, var(--p1), var(--gold), var(--p2));
    pointer-events: none;
  }

  .screen.active .menu-shell,
  .screen.active .end-shell,
  .screen.active .select-header,
  .screen.active .fighter-card {
    animation: panel-in 260ms ease both;
  }

  .brand-mark {
    width: 62px;
    height: 62px;
    margin: 0 auto 20px;
    border: 1px solid rgba(255, 255, 255, .24);
    border-radius: 8px;
    background:
      linear-gradient(135deg, var(--p1), transparent 48%),
      linear-gradient(315deg, var(--p2), transparent 48%),
      #11151d;
    box-shadow:
      inset 0 0 0 1px rgba(255, 255, 255, .10),
      0 0 32px rgba(247, 201, 72, .18);
  }

  .title {
    margin: 0;
    text-align: center;
    font-size: 50px;
    line-height: .95;
    letter-spacing: 0;
  }

  .subtitle {
    margin: 16px auto 28px;
    max-width: 28rem;
    color: var(--soft);
    text-align: center;
    line-height: 1.55;
  }

  .meta-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin: 0 0 26px;
  }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 6px 10px;
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 8px;
    background: rgba(255, 255, 255, .055);
    color: var(--muted);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }

  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    min-height: 50px;
    min-width: 138px;
    border: 1px solid rgba(255, 255, 255, .14);
    border-radius: 8px;
    padding: 13px 20px;
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, .075), rgba(255, 255, 255, .020)),
      var(--panel-strong);
    cursor: pointer;
    font-weight: 900;
    letter-spacing: 0;
    transition:
      transform 120ms ease,
      box-shadow 160ms ease,
      border-color 160ms ease,
      background 160ms ease;
    pointer-events: auto;
  }

  .btn.primary {
    color: #111318;
    border-color: rgba(247, 201, 72, .75);
    background: linear-gradient(180deg, #ffe68a, var(--gold));
    box-shadow: 0 12px 30px rgba(247, 201, 72, .22);
  }

  .btn:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, .32);
    box-shadow: 0 14px 34px rgba(0, 0, 0, .38);
  }

  .btn:active {
    transform: translateY(1px) scale(.98);
    box-shadow: 0 6px 16px rgba(0, 0, 0, .26);
  }

  .select-screen {
    align-content: start;
    justify-items: center;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 16px;
    padding: 26px;
    overflow: hidden;
  }

  .select-header {
    width: min(1040px, 100%);
    display: flex;
    justify-content: space-between;
    align-items: end;
    gap: 16px;
    padding: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, .055), rgba(255, 255, 255, .020)),
      rgba(12, 14, 20, .92);
    box-shadow: var(--tight-shadow);
    backdrop-filter: blur(12px);
  }

  .select-title {
    margin: 0;
    font-size: 32px;
    line-height: 1;
    letter-spacing: 0;
  }

  .select-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .select-layout {
    width: min(1040px, 100%);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    min-height: 0;
    max-height: 100%;
    overflow: auto;
    padding: 2px 6px 10px 2px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 255, 255, .24) transparent;
  }

  .fighter-column {
    min-width: 0;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, .10);
    border-radius: 8px;
    background: rgba(8, 10, 15, .42);
    box-shadow: 0 12px 34px rgba(0, 0, 0, .18);
  }

  .player-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    color: var(--soft);
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
  }

  .player-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    box-shadow: 0 0 18px currentColor;
  }

  .fighter-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }

  .fighter-card {
    min-width: 0;
    display: flex;
    flex-direction: column;
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 8px;
    padding: 10px;
    color: var(--text);
    background:
      linear-gradient(180deg, rgba(255, 255, 255, .050), rgba(255, 255, 255, .015)),
      rgba(17, 20, 28, .96);
    cursor: pointer;
    overflow: hidden;
    isolation: isolate;
    text-align: left;
    transition:
      transform 150ms ease,
      border-color 150ms ease,
      background 150ms ease,
      box-shadow 150ms ease;
    pointer-events: auto;
  }

  .fighter-card:hover {
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, .28);
    box-shadow: 0 12px 28px rgba(0, 0, 0, .26);
  }

  .fighter-card.selected {
    border-color: var(--gold);
    background: rgba(247, 201, 72, .12);
    box-shadow:
      inset 0 0 0 1px rgba(247, 201, 72, .24),
      0 14px 34px rgba(247, 201, 72, .10);
  }

  .portrait {
    height: 70px;
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 8px;
    margin-bottom: 8px;
    background:
      linear-gradient(135deg, var(--fighter-color, #f05252), transparent 50%),
      linear-gradient(315deg, var(--fighter-accent, #f7c948), transparent 48%),
      #11151c;
    position: relative;
    overflow: hidden;
    flex: 0 0 auto;
  }

  .portrait::before,
  .portrait::after {
    content: "";
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, .88);
    pointer-events: none;
    z-index: 1;
  }

  .portrait::before {
    top: 14px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
  }

  .portrait::after {
    top: 39px;
    width: 54px;
    height: 22px;
    border-radius: 18px 18px 6px 6px;
  }

  .portrait-mark {
    position: absolute;
    right: 8px;
    bottom: 6px;
    z-index: 2;
    color: rgba(255, 255, 255, .92);
    font-size: 18px;
    font-weight: 1000;
    letter-spacing: 0;
    text-shadow: 0 2px 10px rgba(0, 0, 0, .42);
  }

  .fighter-info {
    position: relative;
    z-index: 1;
    padding: 10px;
    border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 8px;
    background: rgba(8, 10, 15, .74);
  }

  .fighter-name {
    display: block;
    margin-bottom: 8px;
    font-size: 17px;
    font-weight: 900;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat-line {
    display: grid;
    grid-template-columns: 46px 1fr;
    gap: 8px;
    align-items: center;
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }

  .stat-track {
    height: 6px;
    border-radius: 4px;
    background: rgba(255, 255, 255, .10);
    overflow: hidden;
  }

  .stat-fill {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: var(--fighter-accent, #f7c948);
  }

  .hud {
    position: absolute;
    left: 16px;
    right: 16px;
    top: 14px;
    z-index: 30;
    display: grid;
    grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
    gap: 14px;
    align-items: start;
    opacity: 0;
    transform: translateY(-12px);
    transition: opacity 220ms ease, transform 220ms ease;
    pointer-events: none;
  }

  .hud.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: none;
  }

  .hud-card {
    min-width: 0;
    padding: 12px;
    border: 1px solid rgba(255, 255, 255, .14);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, .060), rgba(255, 255, 255, .020)),
      rgba(8, 10, 15, .76);
    box-shadow: 0 14px 34px rgba(0, 0, 0, .30);
    backdrop-filter: blur(10px);
  }

  .hud-card.low {
    border-color: rgba(240, 82, 82, .55);
    animation: low-health 740ms ease-in-out infinite alternate;
  }

  .hud-card.p2 {
    text-align: right;
  }

  .hud-top {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 900;
  }

  .hud-top span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .hud-card.p2 .hud-top {
    flex-direction: row-reverse;
  }

  .health-track,
  .cooldown-track {
    width: 100%;
    overflow: hidden;
    background: rgba(255, 255, 255, .10);
  }

  .health-track {
    height: 18px;
    border: 1px solid rgba(255, 255, 255, .10);
    border-radius: 6px;
  }

  .cooldown-track {
    height: 5px;
    margin-top: 7px;
    border-radius: 4px;
  }

  .health-fill,
  .cooldown-fill {
    display: block;
    width: 100%;
    height: 100%;
    transform-origin: left center;
  }

  .hud-card.p2 .health-fill,
  .hud-card.p2 .cooldown-fill {
    transform-origin: right center;
  }

  .health-fill {
    transform: scaleX(1);
    transition: transform 320ms cubic-bezier(.2, .8, .2, 1);
  }

  .health-fill.hit {
    animation: health-hit 300ms ease;
  }

  .cooldown-fill {
    background: var(--gold);
    transform: scaleX(1);
  }

  .p1 .health-fill {
    background: linear-gradient(90deg, var(--p1), #f7c948);
  }

  .p2 .health-fill {
    background: linear-gradient(90deg, #35d07f, #38bdf8);
  }

  .round-chip {
    min-width: 104px;
    padding: 10px 14px;
    border: 1px solid rgba(255, 255, 255, .14);
    border-radius: 8px;
    background:
      linear-gradient(180deg, rgba(247, 201, 72, .11), rgba(255, 255, 255, .020)),
      rgba(8, 10, 15, .82);
    color: var(--gold);
    text-align: center;
    font-weight: 1000;
    box-shadow: 0 12px 30px rgba(0, 0, 0, .26);
    backdrop-filter: blur(10px);
  }

  .winner-name {
    margin: 0 0 10px;
    text-align: center;
    font-size: 42px;
    line-height: 1.05;
  }

  .winner-meta {
    margin: 0 0 24px;
    color: var(--muted);
    text-align: center;
  }

  @keyframes countdown-pop {
    from {
      opacity: .2;
      transform: scale(.72);
    }
    to {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes health-hit {
    0% { filter: brightness(2); }
    100% { filter: brightness(1); }
  }

  @keyframes panel-in {
    from {
      opacity: 0;
      transform: translateY(8px) scale(.985);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes low-health {
    from { box-shadow: 0 12px 30px rgba(0, 0, 0, .24); }
    to { box-shadow: 0 12px 34px rgba(240, 82, 82, .22); }
  }
</style>
</head>
<body>
<div class="stage"></div>
<canvas id="gameCanvas"></canvas>

<div class="ui">
  <!-- Main Menu -->
  <div id="mainMenu" class="screen active">
    <div class="menu-shell">
      <div class="brand-mark"></div>
      <h1 class="title">Battlegrounds</h1>
      <p class="subtitle">1v1 Fighting Game</p>
      <div class="actions">
        <button class="btn primary" onclick="game.startGame()">Play Game</button>
      </div>
    </div>
  </div>

  <!-- Fighter Selection -->
  <div id="selectScreen" class="screen select-screen">
    <div class="select-header">
      <h2 class="select-title">Select Your Fighter</h2>
      <div class="select-actions">
        <button class="btn" onclick="game.backToMenu()">Back</button>
      </div>
    </div>
    <div class="select-layout" id="fighterSelect"></div>
  </div>

  <!-- Game HUD -->
  <div class="hud" id="hud">
    <div class="hud-card p1">
      <div class="hud-top">
        <span id="p1-name">Player 1</span>
        <span id="p1-health">100/100</span>
      </div>
      <div class="health-track">
        <div class="health-fill p1" id="p1-health-bar" style="transform: scaleX(1)"></div>
      </div>
      <div class="cooldown-track">
        <div class="cooldown-fill" id="p1-cooldown" style="transform: scaleX(0)"></div>
      </div>
    </div>

    <div class="round-chip" id="roundChip">Round 1</div>

    <div class="hud-card p2">
      <div class="hud-top">
        <span id="p2-health">100/100</span>
        <span id="p2-name">Player 2</span>
      </div>
      <div class="health-track">
        <div class="health-fill p2" id="p2-health-bar" style="transform: scaleX(1)"></div>
      </div>
      <div class="cooldown-track">
        <div class="cooldown-fill" id="p2-cooldown" style="transform: scaleX(0)"></div>
      </div>
    </div>
  </div>

  <!-- Winner Screen -->
  <div id="endScreen" class="screen">
    <div class="end-shell">
      <h2 class="winner-name" id="winnerText">Player 1 Wins!</h2>
      <p class="winner-meta" id="winnerMeta"></p>
      <div class="actions">
        <button class="btn" onclick="game.backToMenu()">Main Menu</button>
        <button class="btn primary" onclick="game.startGame()">Play Again</button>
      </div>
    </div>
  </div>
</div>

<script>
const FIGHTERS = [
  { name: 'Striker', health: 100, speed: 8, damage: 15, color: '#f05252', accent: '#f7c948' },
  { name: 'Guardian', health: 120, speed: 5, damage: 12, color: '#35d07f', accent: '#38bdf8' },
  { name: 'Ninja', health: 85, speed: 12, damage: 18, color: '#38bdf8', accent: '#06b6d4' },
  { name: 'Titan', health: 140, speed: 4, damage: 20, color: '#8b5cf6', accent: '#d946ef' },
  { name: 'Phoenix', health: 95, speed: 10, damage: 16, color: '#f97316', accent: '#fbbf24' },
  { name: 'Shadow', health: 90, speed: 11, damage: 17, color: '#1f2937', accent: '#60a5fa' }
];

class Game {
  constructor() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.gameState = 'menu';
    this.players = [null, null];
    
    window.addEventListener('resize', () => {
      this.canvas.width = window.innerWidth;
      this.canvas.height = window.innerHeight;
    });
    
    window.addEventListener('keydown', (e) => this.handleKeyDown(e));
    window.addEventListener('keyup', (e) => this.handleKeyUp(e));
    
    this.animate();
  }

  startGame() {
    this.gameState = 'selecting';
    this.showScreen('selectScreen');
    this.renderFighterSelect();
  }

  renderFighterSelect() {
    const container = document.getElementById('fighterSelect');
    container.innerHTML = '';
    
    for (let playerIdx = 0; playerIdx < 2; playerIdx++) {
      const column = document.createElement('div');
      column.className = 'fighter-column';
      
      const label = document.createElement('div');
      label.className = 'player-label';
      label.style.color = playerIdx === 0 ? '#f05252' : '#35d07f';
      label.innerHTML = `<div class="player-dot" style="background: currentColor"></div>Player ${playerIdx + 1}`;
      column.appendChild(label);
      
      const grid = document.createElement('div');
      grid.className = 'fighter-grid';
      
      FIGHTERS.forEach((fighter, idx) => {
        const card = document.createElement('div');
        card.className = 'fighter-card';
        card.style.setProperty('--fighter-color', fighter.color);
        card.style.setProperty('--fighter-accent', fighter.accent);
        
        card.innerHTML = `
          <div class="portrait"></div>
          <div class="fighter-info">
            <div class="fighter-name">${fighter.name}</div>
            <div class="stat-line">
              <div>HP</div>
              <div class="stat-track"><div class="stat-fill" style="transform: scaleX(${fighter.health/140})"></div></div>
            </div>
            <div class="stat-line">
              <div>ATK</div>
              <div class="stat-track"><div class="stat-fill" style="transform: scaleX(${fighter.damage/20})"></div></div>
            </div>
            <div class="stat-line">
              <div>SPD</div>
              <div class="stat-track"><div class="stat-fill" style="transform: scaleX(${fighter.speed/12})"></div></div>
            </div>
          </div>
        `;
        
        card.addEventListener('click', () => this.selectFighter(playerIdx, idx));
        grid.appendChild(card);
      });
      
      column.appendChild(grid);
      container.appendChild(column);
    }
  }

  selectFighter(playerIdx, fighterIdx) {
    const template = FIGHTERS[fighterIdx];
    this.players[playerIdx] = {
      idx: playerIdx,
      name: template.name,
      maxHealth: template.health,
      health: template.health,
      speed: template.speed,
      damage: template.damage,
      color: template.color,
      accent: template.accent,
      x: playerIdx === 0 ? 150 : this.canvas.width - 150,
      y: this.canvas.height / 2,
      vx: 0,
      vy: 0,
      attackCooldown: 0,
      isAttacking: false,
      attackAnim: 0,
      keys: {}
    };
    
    if (this.players[0] && this.players[1]) {
      this.gameState = 'playing';
      this.hideScreen('selectScreen');
      this.showHUD();
    }
  }

  backToMenu() {
    this.gameState = 'menu';
    this.players = [null, null];
    this.hideScreen('selectScreen');
    this.hideScreen('endScreen');
    this.showScreen('mainMenu');
    this.hideHUD();
  }

  showScreen(id) {
    document.getElementById(id).classList.add('active');
  }

  hideScreen(id) {
    document.getElementById(id).classList.remove('active');
  }

  showHUD() {
    document.getElementById('hud').classList.add('visible');
  }

  hideHUD() {
    document.getElementById('hud').classList.remove('visible');
  }

  updateHUD() {
    const p1 = this.players[0];
    const p2 = this.players[1];
    
    document.getElementById('p1-name').textContent = p1.name;
    document.getElementById('p1-health').textContent = `${Math.max(0, Math.floor(p1.health))}/${p1.maxHealth}`;
    document.getElementById('p2-name').textContent = p2.name;
    document.getElementById('p2-health').textContent = `${Math.max(0, Math.floor(p2.health))}/${p2.maxHealth}`;
    
    const p1Health = Math.max(0, p1.health) / p1.maxHealth;
    const p2Health = Math.max(0, p2.health) / p2.maxHealth;
    
    document.getElementById('p1-health-bar').style.transform = `scaleX(${p1Health})`;
    document.getElementById('p2-health-bar').style.transform = `scaleX(${p2Health})`;
    
    const p1Card = document.querySelectorAll('.hud-card.p1')[0];
    const p2Card = document.querySelectorAll('.hud-card.p2')[0];
    
    if (p1Health < 0.3) p1Card.classList.add('low');
    else p1Card.classList.remove('low');
    
    if (p2Health < 0.3) p2Card.classList.add('low');
    else p2Card.classList.remove('low');
  }

  handleKeyDown(e) {
    if (this.gameState !== 'playing') return;
    
    const key = e.key.toLowerCase();
    
    if (['w', 'a', 's', 'd'].includes(key)) {
      this.players[0].keys[key] = true;
    }
    if (['arrowup', 'arrowleft', 'arrowdown', 'arrowright'].includes(key)) {
      this.players[1].keys[key] = true;
    }
    
    if (key === ' ' && this.players[0].attackCooldown <= 0) {
      this.players[0].isAttacking = true;
      this.players[0].attackCooldown = 1;
    }
    if (key === 'enter' && this.players[1].attackCooldown <= 0) {
      this.players[1].isAttacking = true;
      this.players[1].attackCooldown = 1;
    }
  }

  handleKeyUp(e) {
    const key = e.key.toLowerCase();
    if (['w', 'a', 's', 'd', 'arrowup', 'arrowleft', 'arrowdown', 'arrowright'].includes(key)) {
      this.players[0].keys[key] = false;
      this.players[1].keys[key] = false;
    }
  }

  updateGame() {
    if (this.gameState !== 'playing') return;
    
    const p1 = this.players[0];
    const p2 = this.players[1];
    
    p1.vx = 0;
    p1.vy = 0;
    if (p1.keys['w']) p1.vy -= p1.speed;
    if (p1.keys['s']) p1.vy += p1.speed;
    if (p1.keys['a']) p1.vx -= p1.speed;
    if (p1.keys['d']) p1.vx += p1.speed;
    
    p2.vx = 0;
    p2.vy = 0;
    if (p2.keys['arrowup']) p2.vy -= p2.speed;
    if (p2.keys['arrowdown']) p2.vy += p2.speed;
    if (p2.keys['arrowleft']) p2.vx -= p2.speed;
    if (p2.keys['arrowright']) p2.vx += p2.speed;
    
    p1.x += p1.vx;
    p1.y += p1.vy;
    p2.x += p2.vx;
    p2.y += p2.vy;
    
    const padding = 50;
    p1.x = Math.max(padding, Math.min(this.canvas.width - padding, p1.x));
    p1.y = Math.max(padding, Math.min(this.canvas.height - padding, p1.y));
    p2.x = Math.max(padding, Math.min(this.canvas.width - padding, p2.x));
    p2.y = Math.max(padding, Math.min(this.canvas.height - padding, p2.y));
    
    p1.attackCooldown = Math.max(0, p1.attackCooldown - 1);
    p2.attackCooldown = Math.max(0, p2.attackCooldown - 1);
    
    if (p1.isAttacking) {
      this.attack(p1, p2);
      p1.isAttacking = false;
      p1.attackAnim = 10;
    }
    if (p2.isAttacking) {
      this.attack(p2, p1);
      p2.isAttacking = false;
      p2.attackAnim = 10;
    }
    
    p1.attackAnim = Math.max(0, p1.attackAnim - 1);
    p2.attackAnim = Math.max(0, p2.attackAnim - 1);
    
    if (p1.health <= 0) {
      this.endGame(p2);
    } else if (p2.health <= 0) {
      this.endGame(p1);
    }
    
    this.updateHUD();
  }

  attack(attacker, defender) {
    const dx = defender.x - attacker.x;
    const dy = defender.y - attacker.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 200) {
      const damage = attacker.damage * (0.8 + Math.random() * 0.4);
      defender.health -= damage;
      attacker.attackCooldown = 60;
    }
  }

  endGame(winner) {
    this.gameState = 'ended';
    document.getElementById('winnerText').textContent = `${winner.name} Wins!`;
    document.getElementById('winnerMeta').textContent = `${winner.name} defeated their opponent!`;
    this.hideHUD();
    this.showScreen('endScreen');
  }

  draw() {
    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    
    if (this.gameState !== 'playing') return;
    
    const p1 = this.players[0];
    const p2 = this.players[1];
    
    this.drawPlayer(p1);
    this.drawPlayer(p2);
    
    if (p1.attackAnim > 0) {
      this.ctx.strokeStyle = `rgba(240, 82, 82, ${p1.attackAnim / 10})`;
      this.ctx.lineWidth = 3;
      this.ctx.beginPath();
      this.ctx.arc(p1.x, p1.y, 200, 0, Math.PI * 2);
      this.ctx.stroke();
    }
    if (p2.attackAnim > 0) {
      this.ctx.strokeStyle = `rgba(53, 208, 127, ${p2.attackAnim / 10})`;
      this.ctx.lineWidth = 3;
      this.ctx.beginPath();
      this.ctx.arc(p2.x, p2.y, 200, 0, Math.PI * 2);
      this.ctx.stroke();
    }
  }

  drawPlayer(player) {
    const scale = 1 + (player.attackAnim / 10) * 0.2;
    
    this.ctx.fillStyle = player.color;
    this.ctx.beginPath();
    this.ctx.arc(player.x, player.y, 30 * scale, 0, Math.PI * 2);
    this.ctx.fill();
    
    this.ctx.fillStyle = '#e8e8e8';
    this.ctx.beginPath();
    this.ctx.arc(player.x, player.y - 45 * scale, 20 * scale, 0, Math.PI * 2);
    this.ctx.fill();
    
    this.ctx.fillStyle = '#000';
    this.ctx.beginPath();
    this.ctx.arc(player.x - 8 * scale, player.y - 50 * scale, 4 * scale, 0, Math.PI * 2);
    this.ctx.fill();
    this.ctx.beginPath();
    this.ctx.arc(player.x + 8 * scale, player.y - 50 * scale, 4 * scale, 0, Math.PI * 2);
    this.ctx.fill();
  }

  animate() {
    this.updateGame();
    this.draw();
    requestAnimationFrame(() => this.animate());
  }
}

const game = new Game();
</script>
